<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Study Color Palette Generator</title>
    <link rel= "stylesheet" href="reset.css"> 
    <link rel= "stylesheet" href="style.css"> 

</head>
<body>
    <header>
        <button class= "mainMenu">&#9776;</button>


        <span class="sizeTitle">Palette Size</span>
        
        <button class="sizeBtn active" data-size="6">6</button>
        <button class="sizeBtn" data-size="8">8</button>
        <button class="sizeBtn" data-size="9">9</button>

        <button class="paletteGeneratorBtn">Generate Palette</button>

        <input type="text" class="paletteName" placeholder="Name your palette" />
        <button class="savePaletteBtn">&#9875;</button>

        <samp class="branding">Colorfly <strong>Studio</strong></samp>

    </header>


    <main class="paletteGenerator"> </main>
    <div class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
