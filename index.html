<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio — Color Palette Generator</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

        <div class="sizeControl" role="group" aria-labelledby="sizeTitle">
            <span class="sizeTitle" id="sizeTitle">Palette Size</span>
            <button class="sizeBtn active" type="button" data-size="6" aria-pressed="true">6</button>
            <button class="sizeBtn" type="button" data-size="8" aria-pressed="false">8</button>
            <button class="sizeBtn" type="button" data-size="9" aria-pressed="false">9</button>
        </div>

        <button class="paletteGeneratorBtn" type="button">Generate Palette</button>

        <label class="visually-hidden" for="paletteName">Palette name</label>
        <input type="text" id="paletteName" class="paletteName" placeholder="Name your palette">
        <button class="savedPaletteBtn" type="button" aria-label="Save palette">&#9875;</button>

        <samp class="branding">Colorfly <strong>Studio</strong></samp>
    </header>

    <main class="paletteGenerator" aria-live="polite" aria-label="Generated color palette"></main>

    <div class="toast" role="status" aria-live="polite"></div>

    <footer class="gradientFooter" aria-hidden="true"></footer>

    <script src="ntc.js"></script>
    <script src="app.js"></script>
</body>
</html>
